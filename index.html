<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>8 марта</title>
    <!-- Элегантные шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0b1a2e;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        /* Тёмно-синий градиент */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #132b44, #05111f);
            z-index: -2;
        }

        /* Тонкие движущиеся абстрактные формы */
        .moving-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: rgba(200, 220, 255, 0.1);
            border-radius: 50%;
            filter: blur(40px);
            animation: floatShape 18s infinite alternate ease-in-out;
        }

        .shape1 {
            width: 40vmax;
            height: 40vmax;
            top: -10vmax;
            right: -10vmax;
            background: rgba(90, 140, 210, 0.1);
            animation-duration: 22s;
        }

        .shape2 {
            width: 30vmin;
            height: 30vmin;
            bottom: 5vh;
            left: -5vmin;
            background: rgba(150, 180, 240, 0.1);
            filter: blur(50px);
            animation-duration: 17s;
        }

        .shape3 {
            width: 50vmin;
            height: 50vmin;
            top: 20vh;
            left: 30vw;
            background: rgba(110, 160, 230, 0.08);
            filter: blur(60px);
            animation-duration: 25s;
        }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(4%, 3%) scale(1.1); }
        }

        /* Основной контент */
        .content {
            max-width: 500px;
            width: 85%;
            padding: 2rem 1.5rem;
            background: rgba(10, 25, 40, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            box-shadow: 0 25px 40px -20px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 1.8s ease-out;
            margin: 1.5rem;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .divider {
            width: 50px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 1.5rem auto;
        }

        /* Специальный блок с красивым текстом */
        .special-message {
            margin: 2.5rem 0 1rem;
        }
        .line1 {
            font-size: 3rem;
            font-weight: 400;
            font-family: 'Playfair Display', 'Times New Roman', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.98);
            text-shadow: 0 0 15px rgba(210, 230, 255, 0.3);
            line-height: 1.2;
        }
        .line2 {
            font-size: 2.8rem;
            font-weight: 400;
            font-family: 'Dancing Script', cursive;
            margin-top: 0.75rem;
            color: rgba(255, 245, 250, 0.95);
            text-shadow: 0 0 12px rgba(255, 220, 240, 0.3);
            line-height: 1.2;
        }

        /* Адаптация под маленькие экраны */
        @media (max-width: 400px) {
            h1 { font-size: 2.4rem; }
            .line1 { font-size: 2.2rem; }
            .line2 { font-size: 2rem; }
            .content { padding: 1.8rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="moving-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <div class="content">
        <h1>8 марта</h1>
        <div class="divider"></div>
        <div class="special-message">
            <div class="line1">E.S.Mapma!</div>
            <div class="line2">I Love You</div>
        </div>
        <!-- Никакого лишнего текста — только элегантная надпись -->
    </div>
</body>
</html>
